<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#ffffff"/>
  <!-- Header -->
  <rect x="0" y="0" width="1080" height="140" fill="#006e1c"/>
  <text x="60" y="90" fill="white" font-family="system-ui,sans-serif" font-size="48" font-weight="900">SL News</text>
  <!-- Article cards -->
  <rect x="30" y="180" width="1020" height="280" rx="24" fill="#f5f5f5"/>
  <rect x="60" y="210" width="100" height="20" rx="10" fill="#006e1c" opacity="0.2"/>
  <rect x="60" y="250" width="700" height="36" rx="8" fill="#333"/>
  <rect x="60" y="300" width="500" height="24" rx="8" fill="#999"/>
  <rect x="860" y="230" width="160" height="160" rx="20" fill="#e0e0e0"/>
  <!-- Card 2 -->
  <rect x="30" y="500" width="1020" height="280" rx="24" fill="#f5f5f5"/>
  <rect x="60" y="530" width="100" height="20" rx="10" fill="#006e1c" opacity="0.2"/>
  <rect x="60" y="570" width="650" height="36" rx="8" fill="#333"/>
  <rect x="60" y="620" width="450" height="24" rx="8" fill="#999"/>
  <rect x="860" y="550" width="160" height="160" rx="20" fill="#e0e0e0"/>
  <!-- Bottom nav -->
  <rect x="250" y="1820" width="580" height="70" rx="35" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <circle cx="350" cy="1855" r="16" fill="#006e1c"/>
  <circle cx="540" cy="1855" r="16" fill="#cccccc"/>
  <circle cx="730" cy="1855" r="16" fill="#cccccc"/>
</svg>
